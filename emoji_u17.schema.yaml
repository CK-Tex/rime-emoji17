# Rime schema
# encoding: utf-8

schema:
  schema_id: emoji_u17
  name: Emoji 17
  version: "17.0.10"
  author:
    - Unicode Emoji data, rime/rime-emoji keywords, generated by build_emoji_u17.py
  description: |
    独立 Emoji 输入方案。
    直接输入关键词拼音，例如 k、kaixin、xiaolian、guoqi。
    输入 v 显示分类，输入 vguoqi 显示国旗分类。

switches:
  - name: ascii_mode
    reset: 0
    states: [ Emoji, ASCII ]

engine:
  processors:
    - ascii_composer
    - lua_processor@*emoji_u17_processor
    - key_binder
    - speller
    - recognizer
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - ascii_segmentor
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - lua_translator@*emoji_u17
  filters:
    - uniquifier

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz"
  delimiter: " '"

menu:
  page_size: 10
  select_keys: "1234567890"

key_binder:
  bindings:
    - { when: has_menu, accept: Return, send: space }
    - { when: has_menu, accept: KP_Enter, send: space }
    - { when: has_menu, accept: Right, send: Down }
    - { when: has_menu, accept: Left, send: Up }
    - { when: has_menu, accept: equal, send: Page_Down }
    - { when: has_menu, accept: minus, send: Page_Up }
    - { when: has_menu, accept: bracketright, send: Page_Down }
    - { when: has_menu, accept: bracketleft, send: Page_Up }
    - { when: has_menu, accept: KP_Add, send: Page_Down }
    - { when: has_menu, accept: KP_Subtract, send: Page_Up }


recognizer:
  import_preset: default
  patterns:
    uppercase: "^[A-Z].*$"
